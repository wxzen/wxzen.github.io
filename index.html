### 🌍 GIS 数字高程可视化
针对 QGIS 在数字高程三维可视化中的短板，自研四叉树 LOD 地形分析应用。后端用 GDAL 为 TIFF 添加坐标系、重采样并切片生成 LOD 金字塔，通过 Python 脚本组织为类似 3D Tiles 的瓦片集。前端 HTTP 请求瓦片，解析元数据构建场景树，基于四叉树 + LOD + Three.js 自定义着色器渲染地形，支持纯色、高程、纹理三种着色模式，实现多级纹理叠加与父子瓦片纹理继承。采用 LRU 缓存与优先队列预加载高优先级瓦片，保证行星级大场景流畅无缝加载。
